<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Household Finance CI/CD</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.login-screen { display: flex; justify-content: center; align-items: center; min-height: 80vh; flex-direction: column; }
.login-btn { padding: 15px 30px; margin: 10px; border: none; border-radius: 50px; font-size: 18px; cursor: pointer; transition: all 0.3s; }
.husband { background: #4CAF50; color: white; }
.wife { background: #2196F3; color: white; }
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

.dashboard { display: none; }
.header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.balance-card { background: linear-gradient(45deg, #ff6b6b, #feca57); color: white; padding: 30px; border-radius: 20px; text-align: center; font-size: 24px; font-weight: bold; }
.notification { position: fixed; top: 20px; right: 20px; background: #4CAF50; color: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transform: translateX(400px); transition: transform 0.3s; z-index: 1000; }
.notification.show { transform: translateX(0); }
.form-group { margin-bottom: 20px; }
input, select, button { padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; width: 100%; margin-bottom: 10px; }
button { background: #667eea; color: white; border: none; cursor: pointer; transition: background 0.3s; }
button:hover { background: #5a67d8; }
.transaction-list { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.transaction { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
.transaction:last-child { border-bottom: none; }
.alert-badge { background: #ff4444; color: white; border-radius: 50%; width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; margin-left: 10px; }
@media (max-width: 768px) { .container { padding: 10px; } .header { flex-direction: column; gap: 15px; text-align: center; } }

.modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); }
.modal .card { background: white; padding: 20px; border-radius: 12px; width: 320px; }
</style>
</head>
<body>
<div class="container">
<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
<h1 style="color: white; font-size: 48px; margin-bottom: 20px;">Household Finance</h1>
<p style="color: white; font-size: 18px; margin-bottom: 20px;">CI/CD Pipeline for Family Budget</p>
<div>
<button class="login-btn husband" onclick="showAuth('husband')">👨 Husband Login / Register</button>
<button class="login-btn wife" onclick="showAuth('wife')">👩 Wife Login / Register</button>
</div>
</div>

<!-- Husband Dashboard -->
<div id="husbandDashboard" class="dashboard">
<div class="header">
<h2>👨 Husband Dashboard <span id="husbandAlerts" class="alert-badge" style="display: none;">0</span></h2>
<button onclick="logout()" style="background: #ff4444; padding: 10px 20px;">Logout</button>
</div>
<div class="balance-card" id="husbandBalance">Balance: ₹0</div>
<!-- Forms -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
<div class="form-group">
<h3>Add Income</h3>
<input id="husbandIncomeAmount" placeholder="Amount ₹" type="number">
<input id="husbandIncomeDesc" placeholder="Description">
<button onclick="addIncome('husband')">💰 Add Income</button>
</div>
<div class="form-group">
<h3>Add EMI/Expense</h3>
<input id="husbandExpenseAmount" placeholder="Amount ₹" type="number">
<input id="husbandExpenseDesc" placeholder="Description">
<select id="husbandExpenseType">
<option value="EMI">Loan EMI</option>
<option value="Expense">Household Expense</option>
</select>
<button onclick="addExpense('husband')">💸 Add Transaction</button>
</div>
</div>
<div class="transaction-list">
<h3>Recent Transactions</h3>
<div id="husbandTransactions"></div>
</div>
</div>

<!-- Wife Dashboard -->
<div id="wifeDashboard" class="dashboard">
<div class="header">
<h2>👩 Wife Dashboard <span id="wifeAlerts" class="alert-badge" style="display: none;">0</span></h2>
<button onclick="logout()" style="background: #ff4444; padding: 10px 20px;">Logout</button>
</div>
<div class="balance-card" id="wifeBalance">Balance: ₹0</div>
<!-- Forms (same structure as husband) -->
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
<div class="form-group">
<h3>Add Income</h3>
<input id="wifeIncomeAmount" placeholder="Amount ₹" type="number">
<input id="wifeIncomeDesc" placeholder="Description">
<button onclick="addIncome('wife')">💰 Add Income</button>
</div>
<div class="form-group">
<h3>Add EMI/Expense</h3>
<input id="wifeExpenseAmount" placeholder="Amount ₹" type="number">
<input id="wifeExpenseDesc" placeholder="Description">
<select id="wifeExpenseType">
<option value="EMI">Loan EMI</option>
<option value="Expense">Household Expense</option>
</select>
<button onclick="addExpense('wife')">💸 Add Transaction</button>
</div>
</div>
<div class="transaction-list">
<h3>Recent Transactions</h3>
<div id="wifeTransactions"></div>
</div>
</div>
</div>

<!-- Notification Template -->
<div id="notificationTemplate" class="notification"></div>

<!-- Auth Modal -->
<div id="authModal" class="modal" style="display: none;">
<div class="card">
<h3 id="authTitle">Login</h3>
<input id="authEmail" placeholder="Email" type="email">
<input id="authPassword" placeholder="Password" type="password">
<div style="display:flex; gap:10px; margin-top:10px;">
<button onclick="doAuth('login')">Login</button>
<button onclick="doAuth('register')">Register</button>
<button onclick="closeAuth()" style="background:#eee; color:#333;">Cancel</button>
</div>
</div>
</div>

<script>
let currentRole = null; // 'husband' or 'wife'
let transactions = [];

function showAuth(role) {
  currentRole = role;
  document.getElementById('authTitle').textContent = `Login / Register (${role})`;
  document.getElementById('authModal').style.display = 'flex';
}
function closeAuth() { document.getElementById('authModal').style.display = 'none'; }

async function doAuth(mode) {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value.trim();
  if (!email || !password) return alert('Provide email and password');
  try {
    const res = await fetch(`/api/${mode}`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const body = await res.json();
    if (!res.ok) return alert(body.error || 'Auth failed');
    // success
    closeAuth();
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById(`${currentRole}Dashboard`).style.display = 'block';
    clearInputFields(currentRole);
    loadTransactions();
  } catch (err) { console.error(err); alert('Network error'); }
}

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  document.querySelectorAll('.dashboard').forEach(d => d.style.display = 'none');
  document.getElementById('loginScreen').style.display = 'flex';
  currentRole = null;
  transactions = [];
}

function clearInputFields(role) {
  document.getElementById(`${role}IncomeAmount`).value = '';
  document.getElementById(`${role}IncomeDesc`).value = '';
  document.getElementById(`${role}ExpenseAmount`).value = '';
  document.getElementById(`${role}ExpenseDesc`).value = '';
}

function notify(message) {
  const notif = document.getElementById('notificationTemplate');
  notif.textContent = message;
  notif.classList.add('show');
  setTimeout(() => notif.classList.remove('show'), 4000);
}

async function loadTransactions() {
  try {
    const res = await fetch('/api/transactions');
    if (!res.ok) {
      if (res.status === 401) { alert('Session expired'); logout(); }
      return;
    }
    transactions = await res.json();
    updateDashboard();
  } catch (err) { console.error(err); }
}

async function addIncome(role) {
  const amount = parseFloat(document.getElementById(`${role}IncomeAmount`).value) || 0;
  const desc = document.getElementById(`${role}IncomeDesc`).value || 'Salary';
  if (amount <= 0) return alert('Enter a valid amount');
  try {
    const res = await fetch('/api/transactions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type: 'income', amount, description: desc })
    });
    if (!res.ok) return alert('Failed to add');
    const body = await res.json();
    transactions.unshift({ id: body.id, type: 'income', amount, description: desc, created_at: new Date().toISOString() });
    clearInputFields(role);
    saveAndRefresh();
    notify(`Added income ₹${amount.toLocaleString()}`);
  } catch (err) { console.error(err); }
}

async function addExpense(role) {
  const amount = parseFloat(document.getElementById(`${role}ExpenseAmount`).value) || 0;
  const desc = document.getElementById(`${role}ExpenseDesc`).value || 'Misc';
  const typeSelect = document.getElementById(`${role}ExpenseType`);
  const type = typeSelect.options[typeSelect.selectedIndex].value.toLowerCase();
  if (amount <= 0) return alert('Enter a valid amount');
  try {
    const res = await fetch('/api/transactions', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, amount, description: desc })
    });
    if (!res.ok) return alert('Failed to add');
    const body = await res.json();
    transactions.unshift({ id: body.id, type, amount, description: desc, created_at: new Date().toISOString() });
    clearInputFields(role);
    saveAndRefresh();
    notify(`Added ${type} ₹${amount.toLocaleString()}`);
  } catch (err) { console.error(err); }
}

async function deleteTransaction(txId) {
  if (!confirm('Delete this transaction?')) return;
  try {
    const res = await fetch(`/api/transactions/${txId}`, { method: 'DELETE' });
    if (!res.ok) return alert('Delete failed');
    transactions = transactions.filter(t => t.id !== txId);
    saveAndRefresh();
  } catch (err) { console.error(err); }
}

function saveAndRefresh() {
  updateDashboard();
}

function updateDashboard() {
  if (!currentRole) return;
  const userTx = transactions;
  const income = userTx.filter(t => t.type === 'income').reduce((s, t) => s + parseFloat(t.amount || 0), 0);
  const emi = userTx.filter(t => t.type === 'emi').reduce((s, t) => s + parseFloat(t.amount || 0), 0);
  const expenses = userTx.filter(t => t.type === 'expense').reduce((s, t) => s + parseFloat(t.amount || 0), 0);
  const balance = income - emi - expenses;
  document.getElementById(`${currentRole}Balance`).textContent = `Balance: ₹${balance.toLocaleString()} (Income: ₹${income.toLocaleString()}, EMI: ₹${emi.toLocaleString()}, Expenses: ₹${expenses.toLocaleString()})`;

  const transactionsDiv = document.getElementById(`${currentRole}Transactions`);
  transactionsDiv.innerHTML = userTx.slice(0, 50).map(t => `
    <div class="transaction">
      <span>${t.description || ''} <small>(${t.type})</small></span>
      <span>${t.type === 'income' ? '+' : '-'} ₹${parseFloat(t.amount).toLocaleString()} <small>${new Date(t.created_at).toLocaleString()}</small> <button onclick="deleteTransaction(${t.id})">Delete</button></span>
    </div>
  `).join('');
}

// periodically refresh transactions
setInterval(() => { if (currentRole) loadTransactions(); }, 5000);
</script>
</body>
</html>
